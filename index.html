<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俳句生成器 - 五七五的诗意</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>俳句生成器</h1>
      <p class="subtitle">以情绪为墨，书写五七五的诗意</p>
    </header>

    <main class="main-content">
      <section class="input-section">
        <div class="emotion-input-wrapper">
          <h2>选择你的情绪</h2>
          
          <div class="emotion-wheel-container">
            <div class="emotion-wheel" id="emotionWheel">
              <svg viewBox="0 0 300 300" class="wheel-svg">
                <g id="wheelSegments"></g>
                <circle cx="150" cy="150" r="40" class="wheel-center" />
                <text x="150" y="155" text-anchor="middle" class="wheel-center-text">情绪</text>
              </svg>
            </div>
          </div>

          <div class="divider">
            <span>或</span>
          </div>

          <div class="custom-input">
            <input 
              type="text" 
              id="emotionInput" 
              placeholder="输入一个情绪词，如：孤独、雀跃、慵懒..."
              maxlength="10"
            />
          </div>

          <button id="generateBtn" class="primary-btn">
            <span class="btn-icon">✦</span>
            生成俳句
          </button>
        </div>
      </section>

      <section class="result-section" id="resultSection">
        <div class="result-header">
          <h2 id="selectedEmotion">你的俳句</h2>
          <div class="action-buttons">
            <button id="regenerateBtn" class="secondary-btn" title="重新生成">
              🔄 换一首
            </button>
            <button id="favoriteBtn" class="secondary-btn" title="收藏">
              ♡ 收藏
            </button>
          </div>
        </div>

        <div class="haiku-display" id="haikuDisplay">
          <p class="haiku-line line-1" id="line1">——</p>
          <p class="haiku-line line-2" id="line2">请选择或输入一个情绪词</p>
          <p class="haiku-line line-3" id="line3">——</p>
        </div>

        <div class="style-selector">
          <h3>选择视觉风格</h3>
          <div class="style-options" id="styleOptions">
            <button class="style-btn active" data-style="ink">水墨</button>
            <button class="style-btn" data-style="warm">暖调</button>
            <button class="style-btn" data-style="cool">冷调</button>
            <button class="style-btn" data-style="vintage">复古</button>
            <button class="style-btn" data-style="minimal">极简</button>
          </div>
        </div>

        <div class="card-preview">
          <h3>卡片预览</h3>
          <div class="preview-container">
            <div class="preview-card" id="previewCard">
              <div class="preview-bg" id="previewBg"></div>
              <div class="preview-overlay" id="previewOverlay"></div>
              <div class="preview-content">
                <p class="preview-line" id="previewLine1"></p>
                <p class="preview-line" id="previewLine2"></p>
                <p class="preview-line" id="previewLine3"></p>
                <p class="preview-emotion" id="previewEmotion"></p>
              </div>
            </div>
          </div>
          
          <div class="download-section">
            <button id="downloadBtn" class="primary-btn download-btn">
              <span class="btn-icon">⬇</span>
              下载卡片
            </button>
          </div>
        </div>

        <div class="favorites-section">
          <h3>我的收藏</h3>
          <div class="favorites-list" id="favoritesList">
            <p class="empty-favorites">还没有收藏的俳句</p>
          </div>
        </div>
      </section>
    </main>

    <canvas id="downloadCanvas" style="display: none;"></canvas>

    <footer class="app-footer">
      <p>俳句 · 五七五 · 一期一会</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
